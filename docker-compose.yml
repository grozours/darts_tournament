
services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: darts_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: darts_tournament
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U darts_user -d darts_tournament"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres_test:
    image: postgres:15-alpine
    profiles:
      - dev
    environment:
      POSTGRES_USER: test
      POSTGRES_PASSWORD: ${POSTGRES_TEST_PASSWORD}
      POSTGRES_DB: darts_tournament_test
    ports:
      - "5433:5432"
    tmpfs:
      - /var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U test -d darts_tournament_test"]
      interval: 5s
      timeout: 3s
      retries: 3

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  redis_test:
    image: redis:7-alpine
    profiles:
      - dev
    ports:
      - "6380:6379"
    command: redis-server
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 3

  sonarqube:
    image: sonarqube:lts-community
    profiles:
      - dev
    ports:
      - "9000:9000"
    environment:
      SONAR_ES_BOOTSTRAP_CHECKS_DISABLE: "true"
    volumes:
      - sonarqube_data:/opt/sonarqube/data
      - sonarqube_extensions:/opt/sonarqube/extensions
      - sonarqube_logs:/opt/sonarqube/logs
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9000/api/system/status | grep -q '\"status\":\"UP\"'"]
      interval: 10s
      timeout: 5s
      retries: 60

  sonar_init:
    image: curlimages/curl:8.6.0
    profiles:
      - dev
    depends_on:
      sonarqube:
        condition: service_healthy
    environment:
      - SONAR_HOST=http://sonarqube:9000
      - SONAR_ADMIN_OLD=${SONAR_ADMIN_OLD:-admin}
      - SONAR_ADMIN_NEW=${SONAR_ADMIN_NEW}
      - SONAR_TOKEN_NAME=${SONAR_TOKEN_NAME:-ci-token}
      - SONAR_TOKEN_FILE=/tmp/sonar-token
      - SONAR_PROJECT_KEY=${SONAR_PROJECT_KEY:-darts-tournament}
      - SONAR_PROJECT_NAME=${SONAR_PROJECT_NAME:-Darts Tournament}
      - SONAR_REGENERATE_TOKEN=${SONAR_REGENERATE_TOKEN:-false}
      - SONAR_WAIT_SECONDS=${SONAR_WAIT_SECONDS:-180}
    volumes:
      - ./scripts/sonar_init.sh:/usr/local/bin/sonar_init.sh:ro
      - ./.sonar-token:/tmp/sonar-token:ro
    entrypoint: ["/bin/sh", "/usr/local/bin/sonar_init.sh"]
    restart: "no"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    ports:
      - "${BACKEND_PORT:-3000}:3000"
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://darts_user:${POSTGRES_PASSWORD}@postgres:5432/darts_tournament
      REDIS_HOST: redis
      REDIS_PORT: 6379
    env_file:
      - ./backend/.env
    volumes:
      - ./backend/src:/app/backend/src
      - ./backend/prisma:/app/backend/prisma
      - ./shared:/app/shared
      - backend_logs:/app/backend/logs
      - backend_uploads:/app/backend/uploads
      - ./backend/backups:/app/backend/backups
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: npm run dev

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        BUILD_ID: ${BUILD_ID:-local}
        DEBUG_UI: ${DEBUG_UI:-false}
    environment:
      BUILD_ID: ${BUILD_ID:-local}
    labels:
      com.darts.build_id: ${BUILD_ID:-local}
    ports:
      - "${FRONTEND_PORT:-3001}:80"
    depends_on:
      - backend

volumes:
  postgres_data:
  redis_data:
  backend_logs:
  backend_uploads:
  sonarqube_data:
  sonarqube_extensions:
  sonarqube_logs: