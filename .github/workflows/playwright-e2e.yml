name: Playwright E2E

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      suite:
        description: Select Playwright suite to run manually
        required: true
        default: full
        type: choice
        options:
          - smoke
          - full

jobs:
  e2e-smoke:
    if: github.event_name == 'pull_request' || (github.event_name == 'workflow_dispatch' && github.event.inputs.suite == 'smoke')
    runs-on:
      - self-hosted
      - linux
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json

      - name: Install backend dependencies
        run: npm ci --prefix backend

      - name: Install frontend dependencies
        run: npm ci --prefix frontend

      - name: Install Playwright browsers
        run: npm --prefix frontend exec -- playwright install

      - name: Run Playwright smoke tests (Chromium)
        run: npm --prefix frontend exec -- playwright test -c ./playwright.config.ts --project=chromium
        env:
          DATABASE_URL: ${{ secrets.PLAYWRIGHT_DATABASE_URL }}
          REDIS_HOST: localhost
          REDIS_PORT: '6379'
          AUTH_ENABLED: 'false'

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-smoke
          path: frontend/playwright-report/
          if-no-files-found: ignore
          retention-days: 14

      - name: Upload Playwright raw results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-results-smoke
          path: frontend/test-results/
          if-no-files-found: ignore
          retention-days: 14

  e2e-full:
    if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && github.event.inputs.suite == 'full')
    runs-on:
      - self-hosted
      - linux
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json

      - name: Install backend dependencies
        run: npm ci --prefix backend

      - name: Install frontend dependencies
        run: npm ci --prefix frontend

      - name: Install Playwright browsers
        run: npm --prefix frontend exec -- playwright install

      - name: Run Playwright full suite (all projects)
        run: npm --prefix frontend exec -- playwright test -c ./playwright.config.ts
        env:
          DATABASE_URL: ${{ secrets.PLAYWRIGHT_DATABASE_URL }}
          REDIS_HOST: localhost
          REDIS_PORT: '6379'
          AUTH_ENABLED: 'false'

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-full
          path: frontend/playwright-report/
          if-no-files-found: ignore
          retention-days: 14

      - name: Upload Playwright raw results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-results-full
          path: frontend/test-results/
          if-no-files-found: ignore
          retention-days: 14
